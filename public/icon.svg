<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    @media (prefers-color-scheme: light) {
      .bg { fill: #f5f2eb; }
    }
    @media (prefers-color-scheme: dark) {
      .bg { fill: #050505; }
    }
  </style>
  <rect class="bg" width="180" height="180" rx="20"/>
  <!-- Border frame -->
  <rect x="18" y="18" width="144" height="144" rx="4" fill="none" stroke="#C5A055" stroke-width="5"/>
  <!-- Cuneiform symbols - simplified geometric shapes -->
  <!-- Top-left: temple-like structure -->
  <g fill="#C5A055">
    <!-- Vertical lines (top-left symbol) -->
    <rect x="35" y="35" width="3" height="30"/>
    <rect x="42" y="38" width="3" height="27"/>
    <rect x="49" y="35" width="3" height="30"/>
    <rect x="56" y="38" width="3" height="27"/>
    <!-- Triangle below -->
    <polygon points="35,70 55,70 45,90"/>
    <!-- Diamond shape -->
    <polygon points="55,60 65,70 55,80 45,70"/>
    
    <!-- Top-right: star/asterisk -->
    <line x1="100" y1="35" x2="100" y2="65" stroke="#C5A055" stroke-width="3"/>
    <line x1="85" y1="50" x2="115" y2="50" stroke="#C5A055" stroke-width="3"/>
    <line x1="88" y1="38" x2="112" y2="62" stroke="#C5A055" stroke-width="3"/>
    <line x1="112" y1="38" x2="88" y2="62" stroke="#C5A055" stroke-width="3"/>
    
    <!-- Bottom-left: chevron/arrow up -->
    <polygon points="45,120 60,105 75,120"/>
    <polygon points="45,140 60,125 75,140"/>
    
    <!-- Bottom-right: tree/plant shape -->
    <polygon points="110,90 120,120 100,120"/>
    <rect x="108" y="120" width="4" height="15"/>
    <polygon points="130,95 140,115 120,115"/>
    <polygon points="120,110 130,140 110,140"/>
  </g>
</svg>